<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>__TITLE__</title>
<meta name="plan-render:md-path" content="__MD_PATH__" />
<meta name="plan-render:md-hash" content="__MD_HASH__" />
<meta name="plan-render:generated-at" content="__GENERATED_AT__" />
<style>
  :root {
    --bg: #fafafa;
    --bg-elev: #ffffff;
    --line: #e4e4e7;
    --fg: #1f2328;
    --muted: #6e7681;
    --accent: #0969da;
    --accent-soft: #ddf4ff;
    --warn-bg: #fff8c5;
    --warn-fg: #7d4e00;
    --warn-line: #d4a72c;
    --code-bg: #f6f8fa;
    --code-fg: #24292f;
    --pre-bg: #f6f8fa;
    --kbd-bg: #f6f8fa;
    --max-content: 880px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --line: #30363d;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: #1f2d3d;
      --warn-bg: #3a2d04;
      --warn-fg: #f0c674;
      --warn-line: #8b6914;
      --code-bg: #161b22;
      --code-fg: #c9d1d9;
      --pre-bg: #161b22;
      --kbd-bg: #21262d;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); }
  body { font: 15px/1.6 -apple-system, "SF Pro Text", "Segoe UI", system-ui, "Noto Sans KR", sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } aside.toc { position: static; border-right: 0; border-bottom: 1px solid var(--line); max-height: 200px; } }

  aside.toc {
    position: sticky; top: 0; align-self: start;
    height: 100vh; overflow-y: auto;
    border-right: 1px solid var(--line); background: var(--bg-elev);
    padding: 20px 16px;
  }
  aside.toc h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 12px; }
  aside.toc ul { list-style: none; padding: 0; margin: 0; }
  aside.toc li { margin: 2px 0; }
  aside.toc a { display: block; padding: 4px 8px; border-radius: 4px; color: var(--fg); font-size: 13px; line-height: 1.4; }
  aside.toc a:hover { background: var(--accent-soft); text-decoration: none; }
  aside.toc a.toc-h3 { padding-left: 20px; color: var(--muted); }
  aside.toc a.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

  main { padding: 32px 40px; max-width: var(--max-content); }
  @media (max-width: 800px) { main { padding: 20px; } }

  .banner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 24px; border-radius: 6px; font-size: 13px; }
  .banner.info { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
  .banner.warn { background: var(--warn-bg); color: var(--warn-fg); border: 1px solid var(--warn-line); }
  .banner code { background: rgba(0,0,0,0.08); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
  @media (prefers-color-scheme: dark) { .banner code { background: rgba(255,255,255,0.08); } }

  h1, h2, h3, h4, h5, h6 { margin-top: 32px; margin-bottom: 12px; line-height: 1.25; font-weight: 600; }
  h1 { font-size: 28px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  h2 { font-size: 22px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  h3 { font-size: 18px; }
  h4 { font-size: 16px; }

  p { margin: 12px 0; }
  ul, ol { padding-left: 28px; margin: 12px 0; }
  li { margin: 4px 0; }
  blockquote { margin: 12px 0; padding: 4px 16px; color: var(--muted); border-left: 3px solid var(--line); background: var(--bg-elev); }

  code { background: var(--code-bg); color: var(--code-fg); padding: 2px 6px; border-radius: 3px; font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  pre { background: var(--pre-bg); padding: 14px 16px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--line); }
  pre code { background: transparent; padding: 0; font-size: 13px; line-height: 1.5; }

  table { border-collapse: collapse; margin: 16px 0; width: 100%; font-size: 14px; }
  th, td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  th { background: var(--bg-elev); font-weight: 600; }
  tr:nth-child(even) td { background: var(--bg-elev); }

  img { max-width: 100%; height: auto; }
  hr { border: 0; border-top: 1px solid var(--line); margin: 28px 0; }

  /* Prism-like minimal token colors */
  .tok-c, .tok-comment { color: #6a737d; font-style: italic; }
  .tok-k, .tok-keyword { color: #d73a49; }
  .tok-s, .tok-string { color: #032f62; }
  .tok-n, .tok-number { color: #005cc5; }
  .tok-f, .tok-function { color: #6f42c1; }
  @media (prefers-color-scheme: dark) {
    .tok-c, .tok-comment { color: #8b949e; }
    .tok-k, .tok-keyword { color: #ff7b72; }
    .tok-s, .tok-string { color: #a5d6ff; }
    .tok-n, .tok-number { color: #79c0ff; }
    .tok-f, .tok-function { color: #d2a8ff; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="toc">
    <h2>목차</h2>
    <ul id="toc-list">__TOC_HTML__</ul>
    <div style="margin-top:24px; font-size:12px; color:var(--muted);">
      <div>source: <a href="__MD_PATH__">__MD_PATH__</a></div>
      <div>hash: <code>__MD_HASH__</code></div>
      <div>generated: __GENERATED_AT__</div>
    </div>
  </aside>
  <main>
    <div class="banner info" id="sync-banner">
      📄 <strong>Derived viewer.</strong> Edit <code>__MD_PATH__</code> — this HTML re-renders from MD.
    </div>
    <article id="content">__BODY_HTML__</article>
  </main>
</div>
<script>
  (function () {
    // Scroll-spy: highlight current section in TOC
    var links = Array.prototype.slice.call(document.querySelectorAll('aside.toc a[href^="#"]'));
    if (!links.length) return;
    var sections = links.map(function (a) {
      var id = decodeURIComponent(a.getAttribute('href').slice(1));
      return { a: a, el: document.getElementById(id) };
    }).filter(function (s) { return s.el; });
    function onScroll() {
      var y = window.scrollY + 80;
      var active = sections[0];
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].el.offsetTop <= y) active = sections[i]; else break;
      }
      links.forEach(function (l) { l.classList.remove('active'); });
      if (active) active.a.classList.add('active');
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })();
</script>
</body>
</html>
