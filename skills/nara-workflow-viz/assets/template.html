<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>__WORKFLOW_TITLE__</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a2027;
    --line: #2a323c;
    --fg: #e7ecf3;
    --muted: #8a96a6;
    --accent: #6aa9ff;
    --accent-2: #ffb86a;
    --dim: 0.18;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font: 14px/1.5 -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif; }
  a { color: var(--accent); }
  .app {
    display: grid;
    grid-template-columns: 240px 1fr 360px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; }
  header .meta { color: var(--muted); margin-left: 12px; font-size: 12px; }
  header .reset { margin-left: auto; background: transparent; color: var(--muted); border: 1px solid var(--line); padding: 4px 10px; border-radius: 6px; cursor: pointer; font: inherit; }
  header .reset:hover { color: var(--fg); border-color: var(--accent); }

  aside.actions {
    border-right: 1px solid var(--line);
    background: var(--panel);
    overflow-y: auto;
    padding: 12px 8px;
  }
  aside.actions h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 6px 8px; margin: 0 0 6px; }
  .action {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    color: var(--fg);
    border: 1px solid transparent;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    margin-bottom: 2px;
  }
  .action:hover { background: var(--panel-2); }
  .action.active { background: var(--panel-2); border-color: var(--accent); color: var(--accent); }
  .action .sub { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

  main.canvas {
    position: relative;
    overflow: auto;
    padding: 24px;
  }
  .groups {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(180px, 1fr);
    gap: 32px;
    position: relative;
    z-index: 1;
    align-items: start;
  }
  .group { display: flex; flex-direction: column; gap: 14px; }
  .group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line);
  }
  .node {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .node .name { font-weight: 600; }
  .node .desc { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .node[data-dim="1"] { opacity: var(--dim); }
  .node.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(106, 169, 255, 0.18);
  }
  .node.endpoint-from { border-color: var(--accent); }
  .node.endpoint-to { border-color: var(--accent-2); }

  svg.edges {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  svg.edges path { fill: none; stroke: var(--line); stroke-width: 1.2; opacity: 0.5; transition: opacity 0.2s; }
  svg.edges path.active { stroke: var(--accent); stroke-width: 2; opacity: 1; }
  svg.edges text.label { fill: var(--accent); font: 600 11px sans-serif; }
  svg.edges circle.bullet { fill: var(--accent); }
  svg.edges text.bullet-num { fill: var(--bg); font: 700 10px sans-serif; text-anchor: middle; dominant-baseline: central; }

  aside.steps {
    border-left: 1px solid var(--line);
    background: var(--panel);
    overflow-y: auto;
    padding: 16px;
  }
  aside.steps h2 { font-size: 14px; margin: 0 0 4px; }
  aside.steps .summary { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  aside.steps .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
  .step {
    border-left: 2px solid var(--accent);
    padding: 0 0 14px 14px;
    margin-left: 8px;
    position: relative;
  }
  .step::before {
    content: attr(data-n);
    position: absolute;
    left: -11px;
    top: 0;
    width: 20px; height: 20px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 50%;
    font: 700 11px sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .step .hop { font-weight: 600; }
  .step .hop .arrow { color: var(--muted); margin: 0 6px; }
  .step .row { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .step .row b { color: var(--fg); font-weight: 500; margin-right: 6px; }
  .step .notes { margin-top: 6px; font-size: 12px; color: var(--fg); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 id="title">__WORKFLOW_TITLE__</h1>
    <span class="meta" id="meta"></span>
    <button class="reset" id="reset">Reset</button>
  </header>

  <aside class="actions">
    <h2>Actions</h2>
    <div id="action-list"></div>
  </aside>

  <main class="canvas" id="canvas">
    <svg class="edges" id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="groups" id="groups"></div>
  </main>

  <aside class="steps">
    <h2 id="step-title">Select an action</h2>
    <div class="summary" id="step-summary"></div>
    <div id="step-list"><div class="empty">Click an action on the left to inspect package-to-package flow.</div></div>
  </aside>
</div>

<script>
  const DATA = /* __WORKFLOW_JSON__ */ {"title":"Workflow Map","packages":[],"actions":[]};

  const $title = document.getElementById('title');
  const $meta = document.getElementById('meta');
  const $actionList = document.getElementById('action-list');
  const $groups = document.getElementById('groups');
  const $edges = document.getElementById('edges');
  const $stepTitle = document.getElementById('step-title');
  const $stepSummary = document.getElementById('step-summary');
  const $stepList = document.getElementById('step-list');
  const $reset = document.getElementById('reset');
  const $canvas = document.getElementById('canvas');

  $title.textContent = DATA.title || 'Workflow Map';
  $meta.textContent = `${DATA.packages.length} packages · ${DATA.actions.length} actions`;

  // group packages
  const groupOrder = [];
  const grouped = new Map();
  for (const p of DATA.packages) {
    const g = p.group || 'other';
    if (!grouped.has(g)) { grouped.set(g, []); groupOrder.push(g); }
    grouped.get(g).push(p);
  }
  for (const g of groupOrder) {
    const col = document.createElement('div');
    col.className = 'group';
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = g;
    col.appendChild(label);
    for (const p of grouped.get(g)) {
      const node = document.createElement('div');
      node.className = 'node';
      node.id = `node-${p.id}`;
      node.dataset.pkg = p.id;
      node.innerHTML = `<div class="name"></div><div class="desc"></div>`;
      node.querySelector('.name').textContent = p.name || p.id;
      if (p.description) node.querySelector('.desc').textContent = p.description;
      else node.querySelector('.desc').remove();
      col.appendChild(node);
    }
    $groups.appendChild(col);
  }

  // build action list
  for (const a of DATA.actions) {
    const btn = document.createElement('button');
    btn.className = 'action';
    btn.dataset.actionId = a.id;
    btn.innerHTML = `<span class="label"></span>${a.summary ? '<span class="sub"></span>' : ''}`;
    btn.querySelector('.label').textContent = a.label || a.id;
    if (a.summary) btn.querySelector('.sub').textContent = a.summary;
    btn.addEventListener('click', () => renderAction(a.id));
    $actionList.appendChild(btn);
  }

  function clearHighlight() {
    document.querySelectorAll('.node').forEach(n => {
      n.classList.remove('highlight', 'endpoint-from', 'endpoint-to');
      n.dataset.dim = '0';
    });
    document.querySelectorAll('.action').forEach(b => b.classList.remove('active'));
    $edges.innerHTML = '';
  }

  function renderAction(actionId) {
    const action = DATA.actions.find(a => a.id === actionId);
    if (!action) return;

    document.querySelectorAll('.action').forEach(b =>
      b.classList.toggle('active', b.dataset.actionId === actionId));

    const involved = new Set();
    for (const s of action.steps) { involved.add(s.from); involved.add(s.to); }

    document.querySelectorAll('.node').forEach(n => {
      const inUse = involved.has(n.dataset.pkg);
      n.dataset.dim = inUse ? '0' : '1';
      n.classList.toggle('highlight', inUse);
    });

    $stepTitle.textContent = action.label || action.id;
    $stepSummary.textContent = action.summary || '';
    $stepList.innerHTML = '';
    action.steps.forEach((step, idx) => {
      const fromName = nameOf(step.from);
      const toName = nameOf(step.to);
      const el = document.createElement('div');
      el.className = 'step';
      el.dataset.n = String(idx + 1);
      const rows = [];
      if (step.via) rows.push(`<div class="row"><b>via</b>${escape(step.via)}</div>`);
      if (step.data) rows.push(`<div class="row"><b>data</b>${escape(step.data)}</div>`);
      if (step.trigger) rows.push(`<div class="row"><b>trigger</b>${escape(step.trigger)}</div>`);
      el.innerHTML = `
        <div class="hop">${escape(fromName)}<span class="arrow">→</span>${escape(toName)}</div>
        ${rows.join('')}
        ${step.notes ? `<div class="notes">${escape(step.notes)}</div>` : ''}
      `;
      $stepList.appendChild(el);
    });

    drawEdges(action.steps);
  }

  function nameOf(id) {
    const p = DATA.packages.find(p => p.id === id);
    return p ? (p.name || p.id) : id;
  }
  function escape(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function drawEdges(steps) {
    const canvasRect = $canvas.getBoundingClientRect();
    const scrollX = $canvas.scrollLeft;
    const scrollY = $canvas.scrollTop;
    $edges.setAttribute('width', $canvas.scrollWidth);
    $edges.setAttribute('height', $canvas.scrollHeight);
    $edges.style.width = $canvas.scrollWidth + 'px';
    $edges.style.height = $canvas.scrollHeight + 'px';
    $edges.innerHTML = '';

    steps.forEach((s, idx) => {
      const a = document.getElementById(`node-${s.from}`);
      const b = document.getElementById(`node-${s.to}`);
      if (!a || !b) return;
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      const x1 = ar.left + ar.width / 2 - canvasRect.left + scrollX;
      const y1 = ar.top + ar.height / 2 - canvasRect.top + scrollY;
      const x2 = br.left + br.width / 2 - canvasRect.left + scrollX;
      const y2 = br.top + br.height / 2 - canvasRect.top + scrollY;
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      const dx = Math.abs(x2 - x1) * 0.35;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
      path.setAttribute('d', d);
      path.classList.add('active');
      $edges.appendChild(path);

      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circ.setAttribute('cx', mx);
      circ.setAttribute('cy', my);
      circ.setAttribute('r', 10);
      circ.classList.add('bullet');
      $edges.appendChild(circ);

      const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      num.setAttribute('x', mx);
      num.setAttribute('y', my);
      num.classList.add('bullet-num');
      num.textContent = String(idx + 1);
      $edges.appendChild(num);

      if (s.via) {
        const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lbl.setAttribute('x', mx + 14);
        lbl.setAttribute('y', my - 6);
        lbl.classList.add('label');
        lbl.textContent = s.via;
        $edges.appendChild(lbl);
      }
    });
  }

  $reset.addEventListener('click', () => {
    clearHighlight();
    $stepTitle.textContent = 'Select an action';
    $stepSummary.textContent = '';
    $stepList.innerHTML = '<div class="empty">Click an action on the left to inspect package-to-package flow.</div>';
  });

  window.addEventListener('resize', () => {
    const active = document.querySelector('.action.active');
    if (active) renderAction(active.dataset.actionId);
  });
</script>
</body>
</html>
