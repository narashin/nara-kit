name: memory-archive-eval
description: Evaluation suite for memory-archive skill — move flagged memory to archive/ and update MEMORY.md.
skill: memory-archive
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 180
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill move the file and update MEMORY.md index correctly?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: archive_action
    config:
      regex_match:
        - "(?i)(archived|noop|action)"
tasks:
  - "tasks/*.yaml"
