name: memory-audit-eval
description: Evaluation suite for memory-audit skill — 4-signal health scoring of auto-memory files.
skill: memory-audit
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill audit memories and produce a labeled score table?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: scoring_output
    config:
      regex_match:
        - "(?i)(healthy|watch|suspect|danger)"
        - "(?i)(score|signals|label)"
tasks:
  - "tasks/*.yaml"
