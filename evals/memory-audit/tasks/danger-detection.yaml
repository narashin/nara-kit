id: danger-detection-001
name: "Stale memory with missing refs should score danger"
description: |
  Test that a memory with declared ref_paths pointing to non-existent files,
  and a verified_at older than 90 days, scores >= 3 and is labeled danger.
tags:
  - danger-path
inputs:
  prompt: "/memory-audit"
  files:
    - path: fixtures/stale-memory.md
expected:
  output_contains:
    - "danger"
    - "ref_validity"
  outcomes:
    - type: task_completed
