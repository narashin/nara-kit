name: plan-render-eval
description: Evaluation suite for plan-render skill — derives self-contained HTML viewer from long plan/spec markdown.
skill: plan-render
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill correctly apply threshold rule and produce/skip HTML?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: threshold_awareness
    config:
      regex_match:
        - "(?i)(threshold|임계|skip|render|200|8 ?KB|hash)"
tasks:
  - "tasks/*.yaml"
