id: basic-render-001
name: "Render long plan to HTML viewer"
description: |
  Test that the skill renders a plan markdown above the 200-line threshold
  into a derived HTML viewer with sync hash and TOC, and inserts a viewer
  link header into the source MD.
tags:
  - basic
  - happy-path
inputs:
  prompt: "/plan-render docs/plan/sample-long.md"
  files:
    - path: fixtures/sample-long.md
expected:
  output_contains:
    - ".html"
    - "hash"
  output_not_contains:
    - "skipped"
  outcomes:
    - type: task_completed
