id: edge-case-001
name: "Classify design document request as doc mode"
description: |
  When the user asks for a design spec or planning document, the orchestrator
  should classify as doc mode and route to workflow-doc-mode.
tags:
  - edge-case
inputs:
  prompt: "알림 시스템 설계 문서 작성해줘. 아직 구현은 안 할 거야"
  files: []
expected:
  output_contains:
    - "doc"
  output_not_contains:
    - "TDD"
    - "gap 분석"
    - "구현"
  outcomes:
    - type: task_completed
