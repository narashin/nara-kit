name: workflow-orchestrator-eval
description: Evaluation suite for workflow-orchestrator — mode classification and routing.
skill: workflow-orchestrator
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill classify the request mode and route to the correct downstream workflow?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(Workflow|Mode|doc|dev|Intake|route|분류|모드)"
tasks:
  - "tasks/*.yaml"
