name: mwhat-eval
description: Evaluation suite for mwhat — session state assessment and next-action recommendation.
skill: mwhat
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce a situation assessment with next-action recommendation?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(현재 상황|추천|브랜치|gap|branch|status|recommend)"
tasks:
  - "tasks/*.yaml"
