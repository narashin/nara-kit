id: edge-case-001
name: "Session on main branch with no docs"
description: |
  When on main branch with no docs/requirements.md or docs/gap.md,
  mwhat should detect the absence and recommend /prep as the first step.
tags:
  - edge-case
inputs:
  prompt: "어디까지 했지"
  files: []
expected:
  output_contains:
    - "main"
  output_not_contains:
    - "gap 점수"
    - "리뷰"
  outcomes:
    - type: task_completed
