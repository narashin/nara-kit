id: should-not-trigger-001
name: "Direct code task should not trigger mwhat"
description: |
  A direct implementation request like refactoring should not activate mwhat.
  mwhat is only for session state assessment, not code execution.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "이 함수를 리팩터링해줘"
  files: []
expected:
  output_not_contains:
    - "현재 상황"
    - "추천"
    - "gap 점수"
    - "브랜치"
