id: basic-usage-001
name: "Session start assessment on feature branch"
description: |
  Verify that mwhat collects git state, checks docs/requirements.md and docs/gap.md,
  and produces a situation summary with a concrete next-action recommendation.
tags:
  - basic
  - happy-path
inputs:
  prompt: "mwhat"
  files: []
expected:
  output_contains:
    - "브랜치"
    - "추천"
  output_not_contains:
    - "코드를 작성"
    - "구현하겠습니다"
  outcomes:
    - type: task_completed
