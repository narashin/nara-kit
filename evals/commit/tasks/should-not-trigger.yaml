id: should-not-trigger-001
name: "Code explanation should not trigger commit"
description: |
  Test that a code explanation request does NOT activate commit message
  generation logic. The skill should only trigger for commit-related prompts.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "이 코드 뭐하는 건지 설명해줘"
  files: []
expected:
  output_not_contains:
    - "git diff --cached"
    - "git commit"
    - "NO-ISSUE"
    - "feat:"
    - "fix:"
    - "refactor:"
