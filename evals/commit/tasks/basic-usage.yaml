id: basic-usage-001
name: "Commit message generation from staged changes"
description: |
  Test that the skill analyzes staged git changes and generates a conventional
  commit message with the correct TICKET-ID prefix and type classification.
tags:
  - basic
  - happy-path
inputs:
  prompt: "/commit PROJ-111 커밋 메시지 생성해줘"
  files: []
expected:
  output_contains:
    - "git diff --cached"
    - "PROJ-111"
  output_not_contains:
    - "git push"
    - "--no-verify"
  outcomes:
    - type: task_completed
