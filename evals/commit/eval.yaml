name: commit-eval
description: Evaluation suite for commit message generation skill.
skill: commit
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill generate a properly formatted conventional commit message?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: commit_format
    config:
      regex_match:
        - "(?i)(feat|fix|docs|style|refactor|perf|test|chore|ci|revert):"
        - "(?i)(git diff --cached|staged|스테이징)"
tasks:
  - "tasks/*.yaml"
