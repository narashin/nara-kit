id: edge-case-001
name: "EPT when subagent dispatch is unavailable"
description: |
  Verifies that when the Agent tool is unavailable for subagent dispatch,
  the skill does not fall back to self-rereading the prompt. It should
  report "empirical evaluation skipped" and suggest delegating to a
  separate session.
tags:
  - edge-case
inputs:
  prompt: "프롬프트 튜닝해줘 skills/pr-respond/SKILL.md -- Agent tool 사용 불가 환경"
  files: []
expected:
  output_contains:
    - "subagent"
    - "unclear"
  output_not_contains:
    - "converge"
    - "iteration 3"
  outcomes:
    - type: task_completed
