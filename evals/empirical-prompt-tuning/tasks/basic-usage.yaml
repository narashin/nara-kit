id: basic-usage-001
name: "Tune skill prompt via subagent dispatch and two-sided evaluation"
description: |
  Verifies that the skill runs the EPT core loop: static check (iter 0),
  prepares evaluation scenarios, dispatches a bias-free subagent executor,
  evaluates two-sidedly (executor self-report + instruction-side metrics),
  and iterates until convergence.
tags:
  - basic
  - happy-path
inputs:
  prompt: "이 스킬 프롬프트 튜닝해줘 skills/test-discover/SKILL.md"
  files: []
expected:
  output_contains:
    - "iteration"
    - "subagent"
    - "accuracy"
  output_not_contains:
    - "skill created"
    - "SKILL.md generated"
  outcomes:
    - type: task_completed
