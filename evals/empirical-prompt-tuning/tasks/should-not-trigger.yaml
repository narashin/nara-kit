id: should-not-trigger-001
name: "New skill creation request does not trigger EPT"
description: |
  Validates that a request to create a brand new skill does not trigger
  empirical-prompt-tuning. This should route to skill-development instead.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "스킬 새로 만들어줘 -- 코드 리뷰 자동화 스킬"
  files: []
expected:
  output_not_contains:
    - "iteration"
    - "subagent"
    - "converge"
    - "accuracy"
    - "two-sided"
