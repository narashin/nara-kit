name: test-discover-eval
description: Evaluation suite for test-discover.
skill: test-discover
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce S2 candidates, S3 selection, and scenarios-detailed.md?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(S2|S3|scenario|시나리오|Happy|Edge|Error)"
tasks:
  - "tasks/*.yaml"
