id: should-not-trigger-001
name: "Test code request does not trigger test-discover"
description: |
  Validates that a request to write actual test code triggers test-implement,
  not test-discover. The skill should not activate when the user wants code
  rather than scenario documents.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "테스트 코드 짜줘 src/api/orders.ts"
  files: []
expected:
  output_not_contains:
    - "S2"
    - "S3"
    - "scenarios-detailed.md"
    - "Candidate Discovery"
