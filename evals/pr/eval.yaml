name: pr-eval
description: Evaluation suite for PR generation skill.
skill: pr
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill generate a PR title and body with proper format and Korean content?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: pr_structure
    config:
      regex_match:
        - "(?i)(gh pr create|pull request|PR)"
        - "(?i)(개요|Changes|Validation|git log)"
tasks:
  - "tasks/*.yaml"
