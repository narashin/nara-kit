id: basic-usage-001
name: "PR generation from branch commits"
description: |
  Test that the skill detects the base branch, collects commits via git log,
  and generates a PR title with TICKET-ID and type, plus a Korean body
  with Overview, Changes, and Validation sections.
tags:
  - basic
  - happy-path
inputs:
  prompt: "PR 만들어줘"
  files: []
expected:
  output_contains:
    - "git log"
    - "gh pr create"
  output_not_contains:
    - "git commit"
  outcomes:
    - type: task_completed
