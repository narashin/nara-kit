id: should-not-trigger-001
name: "Code review request should not trigger explain"
description: |
  Asking for a code review is not an explanation request. The explain skill
  should not activate for review-oriented prompts.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "이 PR에 버그 있는지 리뷰해줘"
  files: []
expected:
  output_not_contains:
    - "대상"
    - "Audience"
    - "설명 문서"
    - "docs/explain"
