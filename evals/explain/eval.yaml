name: explain-eval
description: Evaluation suite for explain — audience-tailored code/feature explanations.
skill: explain
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce an audience-appropriate explanation?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(설명|explain|audience|대상|Audience|목적)"
tasks:
  - "tasks/*.yaml"
