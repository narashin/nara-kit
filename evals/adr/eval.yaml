name: adr-eval
description: Evaluation suite for adr — architecture decision record creation.
skill: adr
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce an ADR with context, options, and consequences?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(ADR|Decision|Context|Options|Consequences|아키텍처|결정)"
tasks:
  - "tasks/*.yaml"
