id: should-not-trigger-001
name: "Routine bugfix should not trigger ADR"
description: |
  A simple bugfix does not involve architecture decisions.
  ADR should not activate for routine implementation tasks.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "NullPointerException 발생하는 버그 수정해줘"
  files: []
expected:
  output_not_contains:
    - "ADR"
    - "Architecture Decision"
    - "Context"
    - "Consequences"
