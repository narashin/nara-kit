name: pr-respond-eval
description: Evaluation suite for pr-respond.
skill: pr-respond
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill classify review comments and decide accept, rebut, or hold with technical verification?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(accept|rebut|hold|blocking|suggestion|review)"
tasks:
  - "tasks/*.yaml"
