name: rfc-eval
description: Evaluation suite for RFC document generation skill.
skill: rfc
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce a complete RFC document with all required sections?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: rfc_sections
    config:
      regex_match:
        - "(?i)(background|goal|proposal|work to do|impact|risk|open questions)"
        - "(?i)(docs/rfc/|RFC|Status:)"
tasks:
  - "tasks/*.yaml"
