name: workflow-doc-mode-eval
description: Evaluation suite for workflow-doc-mode.
skill: workflow-doc-mode
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce the correct documentation artifact type and follow the doc-mode gates?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(doc|spec|RFC|design|artifact|Intake)"
tasks:
  - "tasks/*.yaml"
