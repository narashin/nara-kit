id: basic-usage-001
name: "Doc mode produces spec artifact from planning request"
description: |
  Verifies that a documentation-first request correctly identifies the artifact type
  as spec, routes through the doc-mode gates, and produces a structured design document
  rather than jumping to code implementation.
tags:
  - basic
  - happy-path
inputs:
  prompt: "알림 시스템 설계 문서 만들어줘. 사용자가 Slack, Email, In-app 채널 중 선택할 수 있고 재시도 로직이 필요해"
  files: []
expected:
  output_contains:
    - "spec"
    - "artifact"
  output_not_contains:
    - "npm install"
    - "git commit"
    - "import React"
  outcomes:
    - type: task_completed
