id: should-not-trigger-001
name: "Gap analysis request should not trigger prep"
description: |
  A request for gap analysis between requirements and code should activate /gap,
  not /prep. Prep is only for SoT localization.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "현재 코드와 요구사항 사이의 갭을 분석해줘"
  files: []
expected:
  output_not_contains:
    - "Source of Truth"
    - "소스 수집"
    - "docs/requirements.md에 저장"
