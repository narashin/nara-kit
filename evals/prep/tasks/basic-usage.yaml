id: basic-usage-001
name: "Localize Jira ticket into requirements.md"
description: |
  Verify that prep fetches content from a Jira ticket URL, structures it into
  the requirements template, and writes docs/requirements.md with source attribution.
tags:
  - basic
  - happy-path
inputs:
  prompt: "/prep PROJ-1234 Jira 티켓 기반으로 요구사항 정리해줘"
  files: []
expected:
  output_contains:
    - "requirements"
    - "PROJ-1234"
  output_not_contains:
    - "구현하겠습니다"
    - "코드를 작성"
  outcomes:
    - type: task_completed
