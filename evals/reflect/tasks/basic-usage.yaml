id: basic-usage-001
name: "Session learning capture"
description: |
  Test that the skill captures session learnings and outputs them under
  the Session Reflect header with Decisions, Conventions, and Warnings sections.
tags:
  - basic
  - happy-path
inputs:
  prompt: "세션 마무리해줘. 오늘 작업한 내용 정리하고 reflect 실행"
  files: []
expected:
  output_contains:
    - "Session Reflect"
    - "Decisions"
    - "Conventions"
    - "Warnings"
  output_not_contains:
    - "git commit"
    - "gap.md"
  outcomes:
    - type: task_completed
