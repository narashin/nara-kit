id: should-not-trigger-001
name: "Code review request should not trigger reflect"
description: |
  Test that a code review request does NOT activate the reflect skill.
  Code review and session reflection serve different purposes.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "코드 리뷰해줘. 이 PR에 있는 변경사항 검토 부탁해"
  files: []
expected:
  output_not_contains:
    - "Session Reflect"
    - "Decisions"
    - "Conventions"
    - "Warnings"
    - "Next Session"
