name: reflect-eval
description: Evaluation suite for session reflection and learning capture skill.
skill: reflect
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill capture session learnings with proper Decisions/Conventions/Warnings structure?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: reflect_sections
    config:
      regex_match:
        - "(?i)(Session Reflect|Decisions|Conventions|Warnings)"
        - "(?i)(git diff|git log|세션|session)"
tasks:
  - "tasks/*.yaml"
