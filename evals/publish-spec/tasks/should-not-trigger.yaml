id: should-not-trigger-001
name: "Spec creation request does not trigger publish-spec"
description: |
  Validates that a request to create a new spec from scratch does not trigger
  publish-spec. This should route to workflow-doc-mode instead.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "인증 모듈 설계 스펙 문서 새로 만들어줘"
  files: []
expected:
  output_not_contains:
    - "Confluence"
    - "dry-run"
    - "publish"
    - "storage format"
    - "confluence-draft"
