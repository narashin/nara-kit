name: publish-spec-eval
description: Evaluation suite for publish-spec.
skill: publish-spec
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill follow dry-run, confirm, publish flow with 7-section template compliance?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(Confluence|dry-run|storage|template|publish)"
tasks:
  - "tasks/*.yaml"
