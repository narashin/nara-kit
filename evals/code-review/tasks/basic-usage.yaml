id: basic-usage-001
name: "Review staged changes before commit"
description: |
  Verify that code-review runs 5 parallel agents (Architecture, Correctness,
  Reliability, Security, Test) and outputs findings grouped by severity with
  file:line references.
tags:
  - basic
  - happy-path
inputs:
  prompt: "커밋 전에 변경사항 리뷰해줘"
  files: []
expected:
  output_contains:
    - "High"
  output_not_contains:
    - "요구사항"
    - "gap 분석"
  outcomes:
    - type: task_completed
