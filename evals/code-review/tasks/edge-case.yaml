id: edge-case-001
name: "Review with no diff — clean working tree"
description: |
  When there are no staged or unstaged changes to review, the skill should
  report that there are no changes to review rather than hallucinating findings.
tags:
  - edge-case
inputs:
  prompt: "코드 리뷰해줘"
  files: []
expected:
  output_not_contains:
    - "[High]"
    - "[Medium]"
    - "구현하겠습니다"
  outcomes:
    - type: task_completed
