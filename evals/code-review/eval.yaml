name: code-review-eval
description: Evaluation suite for code-review — 5-agent parallel code review.
skill: code-review
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce findings grouped by severity with file references?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(High|Medium|Low|finding|review|Architecture|Correctness|Security)"
tasks:
  - "tasks/*.yaml"
