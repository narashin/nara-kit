id: should-not-trigger-001
name: "Code review request should not trigger gap analysis"
description: |
  Test that a code review request does NOT activate gap analysis.
  Gap analysis compares requirements vs code; code review evaluates code quality.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "코드 리뷰해줘. 이 변경사항 품질 좀 봐줘"
  files: []
expected:
  output_not_contains:
    - "requirements.md"
    - "gap.md"
    - "Score"
    - "Agreed Exceptions"
    - "Implemented"
