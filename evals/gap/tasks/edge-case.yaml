id: edge-case-001
name: "Verify mode — lightweight re-check of existing gap.md"
description: |
  Test that the --verify mode only re-checks Missing/Partial items from
  existing gap.md instead of running a full analysis, and updates the score.
tags:
  - edge-case
inputs:
  prompt: "gap --verify 모드로 재검증해줘"
  files:
    - path: docs/gap.md
expected:
  output_contains:
    - "gap.md"
    - "Score"
  output_not_contains:
    - "/prep"
  outcomes:
    - type: task_completed
