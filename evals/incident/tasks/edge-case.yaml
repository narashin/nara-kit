id: edge-case-001
name: "Incident from Jira ticket URL"
description: |
  Test that the skill parses a Jira URL from arguments and fetches
  the issue details before proceeding with the analysis workflow.
tags:
  - edge-case
inputs:
  prompt: "/incident https://jira.example.com/browse/OPS-123 이 티켓 장애 분석해줘"
  files: []
expected:
  output_contains:
    - "incident-report.md"
  output_not_contains:
    - "코드 수정"
    - "git commit"
  outcomes:
    - type: task_completed
