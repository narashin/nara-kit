id: basic-usage-001
name: "Implement test code from scenarios document"
description: |
  Verifies that the skill reads existing test files as golden samples, detects
  project tooling, and implements test code domain-by-domain from a scenarios
  document, running verification after each domain.
tags:
  - basic
  - happy-path
inputs:
  prompt: "시나리오 구현해줘 docs/test-scenarios/scenarios-detailed.md"
  files: []
expected:
  output_contains:
    - "domain"
    - "test"
    - "implement"
  output_not_contains:
    - "S2"
    - "S3"
    - "Candidate Discovery"
  outcomes:
    - type: task_completed
