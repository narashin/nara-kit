id: should-not-trigger-001
name: "Scenario discovery request does not trigger test-implement"
description: |
  Validates that a request to discover or brainstorm test scenarios does not
  trigger test-implement. This should route to test-discover instead.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "테스트 시나리오 뽑아줘 src/services/payment.ts"
  files: []
expected:
  output_not_contains:
    - "golden sample"
    - "domain-by-domain"
    - "pipeline"
    - "implement"
