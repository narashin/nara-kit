id: non-owner-reply-ignored-001
name: "내가 안 단 댓글에 달린 답글은 무시"
description: |
  cursor가 존재하고 새 id의 댓글이 있지만, in_reply_to_id가 내(alice) 댓글이
  아니라 bob의 댓글을 가리킨다. 이 경우 신규 대댓글로 취급하면 안 된다.
tags:
  - filter
inputs:
  prompt: |
    review-reply-reminder --host github.com --repo acme/widgets --reviewer alice 로 실행해줘.

    PR 목록:
    [
      {"number": 7, "title": "Fix pagination", "url": "https://github.com/acme/widgets/pull/7",
       "state": "OPEN", "reviewRequests": [{"login": "alice"}], "reviews": []}
    ]

    PR #7 inline review comments:
    [
      {"id": 200, "user": {"login": "bob"}, "in_reply_to_id": null, "body": "여기 네이밍 이상해요", "html_url": "https://github.com/acme/widgets/pull/7#discussion_r200", "created_at": "2026-06-01T00:00:00Z"},
      {"id": 201, "user": {"login": "carol"}, "in_reply_to_id": 200, "body": "동의합니다", "html_url": "https://github.com/acme/widgets/pull/7#discussion_r201", "created_at": "2026-06-02T00:00:00Z"}
    ]

    기존 추적 이슈: id=tracker-7, title="PR 활동 추적: Fix pagination",
    metadata={"pr_url": "https://github.com/acme/widgets/pull/7", "tracker_type": "reply", "last_comment_id": "199"}
  files: []
expected:
  output_contains:
    - "신규 대댓글 없음"
  output_not_contains:
    - "multica issue comment add"
