id: audit-mode-001
name: Audit Mode — Drift Detection
description: |
  User asks for design drift check. DESIGN.md exists with defined tokens.
  Skill should enter audit mode: parse tokens, scan code, produce drift report.
tags:
  - audit
  - edge-case
inputs:
  prompt: "디자인 드리프트 확인해줘. DESIGN.md 있음."
  files:
    - path: design-md-sample.md
expected:
  output_contains:
    - "drift"
  outcomes:
    - type: task_completed
