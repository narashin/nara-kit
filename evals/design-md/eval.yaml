name: design-md-eval
description: Evaluation suite for design-md skill — adopt, update, audit modes.
skill: design-md
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill complete the assigned task correctly?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: mode_detection
    config:
      regex_match:
        - "(?i)(adopt|update|audit|DESIGN\\.md|template|token|drift)"
  - type: text
    name: no_raw_hex_in_body
    config:
      regex_not_match:
        - "background:\\s*#[0-9a-fA-F]{6}"
tasks:
  - "tasks/*.yaml"
