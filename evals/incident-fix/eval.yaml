name: incident-fix-eval
description: Evaluation suite for incident-fix TDD implementation skill.
skill: incident-fix
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill execute the 3-phase TDD fix workflow from the incident report?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: tdd_phases
    config:
      regex_match:
        - "(?i)(phase|RED|GREEN|테스트|test)"
        - "(?i)(incident-report|리포트)"
tasks:
  - "tasks/*.yaml"
