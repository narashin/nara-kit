id: should-not-trigger-001
name: "General debugging should not trigger incident-fix"
description: |
  Test that a general debugging request does NOT activate the incident-fix
  workflow. The skill is only for structured TDD fixes based on incident reports.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "이 함수에서 에러가 나는데 왜 그런지 디버깅 좀 해줘"
  files: []
expected:
  output_not_contains:
    - "incident-report.md"
    - "Phase 1"
    - "RED"
    - "GREEN"
    - "TDD"
