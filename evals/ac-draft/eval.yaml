name: ac-draft-eval
description: Evaluation suite for ac-draft.
skill: ac-draft
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce User Stories with Why, Gherkin AC with AC-IDs, and non-empty Unknown section?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: required_sections
    config:
      regex_match:
        - "(?i)(user stor|US-\\d|so that)"
        - "(?i)(acceptance criteria|AC-\\d|Given|When|Then)"
        - "(?i)(unknown|needs confirmation)"
  - type: text
    name: hallucination_guard
    config:
      regex_match:
        - "(?i)(\\[UNVERIFIED\\]|\\[NEEDS_CONFIRMATION\\]|\\[NOT FOUND\\])"
tasks:
  - "tasks/*.yaml"
