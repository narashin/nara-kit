id: no-trigger-001
name: "Should not trigger when external SoT is present"
description: |
  Verifies that ac-draft is NOT invoked when the user has already provided
  an external SoT (Jira/Confluence URL). The proper skill in that case is /prep.
tags:
  - routing
  - should-not-trigger
inputs:
  prompt: "https://workers-hub.com/browse/PROJ-1234 요구사항 정리해줘"
  files: []
expected:
  output_not_contains:
    - "ac-draft 실행"
    - "thin intent"
  output_contains:
    - "(?i)(prep|/prep|requirements\\.md)"
  outcomes:
    - type: task_completed
