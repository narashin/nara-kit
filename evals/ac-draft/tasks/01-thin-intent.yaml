id: thin-intent-001
name: "Generate US + Gherkin AC from one-line timezone intent"
description: |
  Verifies that ac-draft produces docs/requirements.md with User Stories (with Why),
  Gherkin Acceptance Criteria (AC-IDs), and a non-empty Unknown section when given
  a one-line intent with no external SoT.
tags:
  - basic
  - happy-path
inputs:
  prompt: "ac-draft: 타임존 기능 제공해야함"
  files: []
expected:
  output_contains:
    - "US-1"
    - "so that"
    - "AC-1"
    - "Given"
    - "When"
    - "Then"
    - "Unknown"
  output_not_contains:
    - "PUT /api"
    - "HTTP 200"
    - "JWT"
  outcomes:
    - type: task_completed
