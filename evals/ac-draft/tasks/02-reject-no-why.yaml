id: reject-no-why-001
name: "Reject User Story without so-that clause"
description: |
  Verifies that ac-draft refuses to generate a User Story when the "so that <benefit>"
  clause cannot be derived from intent. Skill should either ask user for benefit
  or mark blocking Open Question, never silently invent a Why.
tags:
  - edge-case
  - hallucination-guard
inputs:
  prompt: "ac-draft: 코드 정리"
  files: []
expected:
  output_contains:
    - "(?i)(blocking|Open Question|so that|benefit|Why)"
  output_not_contains:
    - "성능 향상"
    - "코드 품질 개선"
  outcomes:
    - type: task_completed
