name: humanizer-eval
description: Evaluation suite for Korean AI text humanizer skill.
skill: humanizer
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill detect AI patterns with severity labels and produce a rewritten natural version?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: humanizer_sections
    config:
      regex_match:
        - "(?i)(분석 결과|자연스러운 버전|감지된 패턴)"
        - "(?i)(S1|S2|S3|자연도 등급)"
tasks:
  - "tasks/*.yaml"
