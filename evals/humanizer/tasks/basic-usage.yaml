id: basic-usage-001
name: "Detect AI patterns and humanize"
description: |
  AI-heavy Korean paragraph with punctuation overuse, hype vocabulary, and translationese.
  Expect detection of S1/S2 patterns and a rewritten natural version.
tags:
  - basic
  - happy-path
inputs:
  prompt: |
    아래 텍스트를 humanizer로 윤문해줘.

    이 혁신적인 프로젝트는, 지속가능한 성장을 위해, 다양한 사용자들의 요구사항들을 효과적으로 충족시킬 수 있을 것이다. 우리는 데이터 분석을 통해 인사이트의 도출을 수행하며, 이를 통해 핵심적인 가치를 창출할 수 있다. 결론적으로, 이러한 접근은 미래의 기반이 될 것이다.
  files: []
expected:
  output_contains:
    - "분석 결과"
    - "자연스러운 버전"
  output_not_contains:
    - "결론적으로, 이러한 접근은 미래의 기반이 될 것이다"
  outcomes:
    - type: task_completed
