id: already-natural-001
name: "Already natural Korean text"
description: |
  Human-written Korean text with little AI marker.
  Expect the skill to acknowledge naturalness without over-correcting.
tags:
  - edge-case
  - already-natural
inputs:
  prompt: |
    아래 텍스트를 humanizer로 검토해줘.

    어제 회의에서 다음 분기 우선순위를 정했다. 우선 인입 페이지 리팩토링부터 끝내기로 했고, A/B 테스트는 다음 주 화요일에 시작한다. 일정이 빠듯해도 큰 무리는 없을 것 같다.
  files: []
expected:
  output_contains:
    - "분석 결과"
  output_not_contains:
    - "S1 5"
    - "S1 6"
    - "S1 7"
  outcomes:
    - type: task_completed
