id: should-not-trigger-001
name: "Non-Korean / off-topic input"
description: |
  English-only or code-review request — humanizer should not engage as humanizer,
  or should redirect to appropriate skill.
tags:
  - guardrail
  - should-not-trigger
inputs:
  prompt: "Review this TypeScript function for bugs."
  files: []
expected:
  output_not_contains:
    - "자연스러운 버전"
    - "감지된 패턴"
  outcomes:
    - type: task_completed
