name: workflow-dev-mode-eval
description: Evaluation suite for workflow-dev-mode — structured implementation workflow with gates.
skill: workflow-dev-mode
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill initiate a structured dev workflow with appropriate gates?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(dev|implementation|gap|TDD|verification|prep|plan|gate)"
tasks:
  - "tasks/*.yaml"
