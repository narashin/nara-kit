name: test-verify-eval
description: Evaluation suite for test-verify.
skill: test-verify
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill dispatch QA Lead, Developer, and Red Team personas and produce a unified verdict?
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: text
    name: relevant_content
    config:
      regex_match:
        - "(?i)(QA Lead|Developer|Red Team|PASS|NEEDS_WORK|FAIL)"
tasks:
  - "tasks/*.yaml"
